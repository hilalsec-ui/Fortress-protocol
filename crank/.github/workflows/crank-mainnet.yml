name: Mainnet Crank

on:
  repository_dispatch:
    types: [trigger-mainnet-draw]
  workflow_dispatch:
    inputs:
      lotteryType:
        description: "Lottery type (LPM, DPL, WPL, MPL)"
        required: false
        default: ""
      tier:
        description: "Tier value (5, 10, 15, 20, 50)"
        required: false
        default: ""

jobs:
  crank:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run crank
        env:
          # Accept either secret name for the crank private key
          CRANK_PRIVATE_KEY: ${{ secrets.CRANK_PRIVATE_KEY || secrets.mainnet_crank }}
          RPC_STANDARD: ${{ secrets.RPC_STANDARD }}
          RPC_GATEKEEPER: ${{ secrets.RPC_GATEKEEPER }}
          RPC_URL: ${{ secrets.RPC_STANDARD || secrets.RPC_URL }}
          RPC_FALLBACK: https://api.mainnet-beta.solana.com
          RPC_TIMEOUT_MS: "30000"
          RPC_MAX_RETRIES: "3"
          RPC_RETRY_DELAY_MS: "2000"
          LOTTERY_TYPE: ${{ github.event.client_payload.lotteryType || github.event.inputs.lotteryType || '' }}
          TIER: ${{ github.event.client_payload.tier || github.event.inputs.tier || '' }}
        run: npx ts-node --transpile-only index.ts
